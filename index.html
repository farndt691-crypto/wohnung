<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immobilien-Sniper – Mannheim</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .badge { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:.7rem; font-weight:700; }
    .tag   { display:inline-block; padding:2px 6px; border-radius:4px; font-size:.7rem; font-weight:500; background:#1e1b4b; color:#a5b4fc; margin-right:3px; margin-bottom:3px; }
    .score-strong_buy { border-left:4px solid #16a34a; }
    .score-watch      { border-left:4px solid #ca8a04; }
    .score-skip       { border-left:4px solid #dc2626; }
    .score-gut        { border-left:4px solid #16a34a; }
    .score-okay       { border-left:4px solid #ca8a04; }
    .score-teuer      { border-left:4px solid #dc2626; }
    .deviation-gut    { background:#14532d; color:#86efac; }
    .deviation-okay   { background:#713f12; color:#fde68a; }
    .deviation-teuer  { background:#7f1d1d; color:#fca5a5; }
    select { background:#1f2937; color:#f3f4f6; border:1px solid #4b5563; border-radius:6px; padding:6px 10px; font-size:.875rem; }
    select option { background:#1f2937; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

<!-- HEADER -->
<header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🎯</span>
      <h1 class="text-lg font-bold text-white">Immobilien-Sniper</h1>
      <span class="text-xs text-gray-400">Mannheim</span>
    </div>
    <div id="stats" class="flex gap-2 ml-auto flex-wrap text-xs">
      <span class="px-3 py-1 rounded-full bg-gray-700 text-gray-200">📊 Gesamt: <strong id="stat-total">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-blue-900 text-blue-200">🏠 Kauf: <strong id="stat-kauf">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-purple-900 text-purple-200">🔑 Miete: <strong id="stat-miete">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-green-900 text-green-200">🟢 <strong id="stat-gut">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-yellow-900 text-yellow-200">🟡 <strong id="stat-ok">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-red-900 text-red-200">🔴 <strong id="stat-bad">–</strong></span>
      <span class="px-3 py-1 rounded-full bg-gray-700 text-gray-400" id="stat-last">🕐 –</span>
    </div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="max-w-7xl mx-auto px-4 pt-5 pb-3 space-y-3">

  <!-- Row 1: Type + Score -->
  <div class="flex flex-wrap gap-3 items-center">
    <div class="flex rounded-lg overflow-hidden border border-gray-700 text-sm font-medium">
      <button onclick="setType('alle')"  id="btn-alle"  class="type-btn px-4 py-2 bg-indigo-600 text-white">Alle</button>
      <button onclick="setType('kauf')"  id="btn-kauf"  class="type-btn px-4 py-2 bg-gray-800 text-gray-300 hover:bg-gray-700">🏠 Kauf</button>
      <button onclick="setType('miete')" id="btn-miete" class="type-btn px-4 py-2 bg-gray-800 text-gray-300 hover:bg-gray-700">🔑 Miete</button>
    </div>
    <div class="flex gap-2 text-sm flex-wrap">
      <button onclick="setScore('')"           id="sc-alle"       class="score-btn px-3 py-1.5 rounded-lg bg-indigo-600 text-white">Alle Scores</button>
      <button onclick="setScore('strong_buy')" id="sc-strong_buy" class="score-btn px-3 py-1.5 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700">🟢 Strong Buy</button>
      <button onclick="setScore('watch')"      id="sc-watch"      class="score-btn px-3 py-1.5 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700">🟡 Watch</button>
      <button onclick="setScore('gut')"        id="sc-gut"        class="score-btn px-3 py-1.5 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700">🟢 Günstig</button>
      <button onclick="setScore('okay')"       id="sc-okay"       class="score-btn px-3 py-1.5 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700">🟡 Okay</button>
      <button onclick="setScore('skip')"       id="sc-skip"       class="score-btn px-3 py-1.5 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700">🔴 Skip/Teuer</button>
    </div>
  </div>

  <!-- Row 2: Location + Zimmer + Refresh -->
  <div class="flex flex-wrap gap-3 items-center">

    <!-- Stadtteil Filter -->
    <div class="flex items-center gap-2">
      <label class="text-gray-400 text-sm whitespace-nowrap">📍 Lage:</label>
      <select id="stadtteil-filter" onchange="render()" class="min-w-[180px]">
        <option value="">Alle Stadtteile</option>
        <optgroup label="— Innenstadt —">
          <option value="Quadrate">Quadrate / Innenstadt</option>
          <option value="Jungbusch">Jungbusch</option>
          <option value="Oststadt">Oststadt</option>
          <option value="Schwetzingerstadt">Schwetzingerstadt</option>
        </optgroup>
        <optgroup label="— Beliebt —">
          <option value="Lindenhof">Lindenhof</option>
          <option value="Neckarstadt-West">Neckarstadt-West</option>
          <option value="Neckarstadt-Ost">Neckarstadt-Ost</option>
          <option value="Almenhof">Almenhof</option>
          <option value="Neuostheim">Neuostheim</option>
          <option value="Gartenstadt">Gartenstadt</option>
        </optgroup>
        <optgroup label="— Weitere —">
          <option value="Rheinau">Rheinau</option>
          <option value="Feudenheim">Feudenheim</option>
          <option value="Kaefertal">Käfertal</option>
          <option value="Vogelstang">Vogelstang</option>
          <option value="Seckenheim">Seckenheim</option>
          <option value="Friedrichsfeld">Friedrichsfeld</option>
          <option value="Waldhof">Waldhof</option>
          <option value="Sandhofen">Sandhofen</option>
          <option value="Schoenau">Schönau</option>
          <option value="Wallstadt">Wallstadt</option>
        </optgroup>
      </select>
    </div>

    <!-- Zimmer Filter -->
    <div class="flex items-center gap-2 text-sm">
      <label class="text-gray-400 whitespace-nowrap">🛏 Zimmer:</label>
      <input id="zimmer-min" type="number" value="2.5" min="1" max="10" step="0.5"
        oninput="render()"
        class="w-16 bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-center text-white text-sm" />
      <span class="text-gray-500">–</span>
      <input id="zimmer-max" type="number" placeholder="max" min="1" max="10" step="0.5"
        oninput="render()"
        class="w-16 bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-center text-white text-sm" />
    </div>

    <button onclick="resetFilters()"
      class="px-3 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-300 text-sm transition-all">
      ✕ Reset
    </button>

    <button onclick="loadData()"
      class="ml-auto flex items-center gap-1.5 px-4 py-1.5 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm font-medium transition-all">
      ↻ Aktualisieren
    </button>
  </div>

  <!-- Active filter summary -->
  <div id="filter-summary" class="text-xs text-gray-500 hidden"></div>
</div>

<!-- CARDS -->
<main class="max-w-7xl mx-auto px-4 pb-12">
  <div id="loading" class="text-center py-24 text-gray-500">
    <p class="text-4xl mb-3">⏳</p>
    <p class="text-lg">Deals werden geladen …</p>
  </div>
  <div id="empty" class="hidden text-center py-24 text-gray-600">
    <p class="text-5xl mb-4">🔍</p>
    <p class="text-xl font-semibold text-gray-400 mb-2">Keine Deals gefunden</p>
    <p class="text-sm">Filter anpassen oder warten bis der Scraper neue Inserate findet (3× täglich).</p>
  </div>
  <div id="cards" class="grid gap-4"></div>
</main>

<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-semibold shadow-xl opacity-0 pointer-events-none z-50 transition-opacity duration-300"></div>

<script>
let allDeals = [];
let activeType  = 'alle';
let activeScore = '';

async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('cards').innerHTML = '';
  document.getElementById('empty').classList.add('hidden');
  try {
    const res = await fetch('data/deals.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allDeals = data.deals || [];

    const kauf  = allDeals.filter(d => d.listing_type === 'kauf');
    const miete = allDeals.filter(d => d.listing_type === 'miete');
    const gut   = allDeals.filter(d => ['strong_buy','gut'].includes(d.deal_score));
    const ok    = allDeals.filter(d => ['watch','okay'].includes(d.deal_score));
    const bad   = allDeals.filter(d => ['skip','teuer'].includes(d.deal_score));

    document.getElementById('stat-total').textContent = allDeals.length;
    document.getElementById('stat-kauf').textContent  = kauf.length;
    document.getElementById('stat-miete').textContent = miete.length;
    document.getElementById('stat-gut').textContent   = gut.length;
    document.getElementById('stat-ok').textContent    = ok.length;
    document.getElementById('stat-bad').textContent   = bad.length;

    const last = data.last_updated;
    document.getElementById('stat-last').textContent =
      last ? '🕐 ' + last.slice(0,16).replace('T',' ') + ' UTC' : '🕐 Noch nie';

    // Populate stadtteil options dynamically from data
    populateStadtteilOptions();
    render();
    showToast('✅ ' + allDeals.length + ' Deals geladen', 'success');
  } catch (e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('empty').classList.remove('hidden');
    showToast('❌ Ladefehler: ' + e.message, 'error');
  }
}

function populateStadtteilOptions() {
  // Add any stadtteile from data that aren't already in the select
  const sel = document.getElementById('stadtteil-filter');
  const existing = new Set([...sel.options].map(o => o.value.toLowerCase()));
  const fromData = [...new Set(allDeals.map(d => d.stadtteil).filter(Boolean))];
  fromData.forEach(st => {
    if (!existing.has(st.toLowerCase())) {
      const opt = document.createElement('option');
      opt.value = st;
      opt.textContent = st;
      sel.appendChild(opt);
    }
  });
}

function setType(t) {
  activeType = t;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.remove('bg-indigo-600','text-white');
    b.classList.add('bg-gray-800','text-gray-300');
  });
  const btn = document.getElementById('btn-' + t);
  if (btn) { btn.classList.add('bg-indigo-600','text-white'); btn.classList.remove('bg-gray-800','text-gray-300'); }
  render();
}

function setScore(s) {
  activeScore = s;
  document.querySelectorAll('.score-btn').forEach(b => {
    b.classList.remove('bg-indigo-600','text-white');
    b.classList.add('bg-gray-800','text-gray-300');
  });
  const key = s === '' ? 'sc-alle' : 'sc-' + s;
  const btn = document.getElementById(key);
  if (btn) { btn.classList.add('bg-indigo-600','text-white'); btn.classList.remove('bg-gray-800','text-gray-300'); }
  render();
}

function resetFilters() {
  activeType  = 'alle';
  activeScore = '';
  document.getElementById('stadtteil-filter').value = '';
  document.getElementById('zimmer-min').value = '2.5';
  document.getElementById('zimmer-max').value = '';
  setType('alle');
  setScore('');
}

function render() {
  document.getElementById('loading').classList.add('hidden');

  const zimMin = parseFloat(document.getElementById('zimmer-min').value) || null;
  const zimMax = parseFloat(document.getElementById('zimmer-max').value) || null;
  const stadtteil = document.getElementById('stadtteil-filter').value.toLowerCase();

  let filtered = allDeals.filter(d => {
    if (activeType !== 'alle' && d.listing_type !== activeType) return false;
    if (activeScore) {
      const s = d.deal_score || '';
      if (activeScore === 'skip' && !['skip','teuer'].includes(s)) return false;
      if (activeScore !== 'skip' && s !== activeScore) return false;
    }
    const zi = d.zimmer;
    if (zimMin !== null && zi !== null && zi !== undefined && zi < zimMin) return false;
    if (zimMax !== null && zi !== null && zi !== undefined && zi > zimMax) return false;
    if (stadtteil && !(d.stadtteil || '').toLowerCase().includes(stadtteil) &&
        !(d.quadrat || '').toLowerCase().includes(stadtteil) &&
        !(d.title || '').toLowerCase().includes(stadtteil)) return false;
    return true;
  });

  // Update filter summary
  const summary = document.getElementById('filter-summary');
  const parts = [];
  if (activeType !== 'alle') parts.push(activeType === 'kauf' ? '🏠 Kauf' : '🔑 Miete');
  if (activeScore) parts.push('Score: ' + activeScore);
  if (stadtteil) parts.push('📍 ' + document.getElementById('stadtteil-filter').options[document.getElementById('stadtteil-filter').selectedIndex].text);
  if (zimMin) parts.push('ab ' + zimMin + ' Zi.');
  if (zimMax) parts.push('bis ' + zimMax + ' Zi.');
  if (parts.length) {
    summary.textContent = 'Filter: ' + parts.join(' · ') + ' → ' + filtered.length + ' Ergebnis' + (filtered.length !== 1 ? 'se' : '');
    summary.classList.remove('hidden');
  } else {
    summary.textContent = filtered.length + ' Deals insgesamt';
    summary.classList.remove('hidden');
  }

  const container = document.getElementById('cards');
  document.getElementById('empty').classList.toggle('hidden', filtered.length > 0);
  container.innerHTML = filtered.map(renderCard).join('');
}

function renderCard(d) {
  const isKauf  = d.listing_type === 'kauf';
  const score   = d.deal_score || '';

  const scoreLabels = {
    strong_buy: ['🟢 Strong Buy', 'bg-green-900 text-green-200'],
    watch:      ['🟡 Watch',      'bg-yellow-900 text-yellow-200'],
    skip:       ['🔴 Skip',       'bg-red-900 text-red-200'],
    gut:        ['🟢 Günstig',    'bg-green-900 text-green-200'],
    okay:       ['🟡 Okay',       'bg-yellow-900 text-yellow-200'],
    teuer:      ['🔴 Zu teuer',   'bg-red-900 text-red-200'],
  };
  const [scoreLabel, scoreCls] = scoreLabels[score] || ['⚪ Unklar', 'bg-gray-700 text-gray-400'];

  const typeBadge = isKauf
    ? '<span class="badge bg-blue-900 text-blue-200">🏠 Kauf</span>'
    : '<span class="badge bg-purple-900 text-purple-200">🔑 Miete</span>';

  const srcColors = { kleinanzeigen: 'bg-orange-900 text-orange-200', wg_gesucht: 'bg-teal-900 text-teal-200' };
  const srcCls = srcColors[d.source] || 'bg-gray-700 text-gray-400';

  // Location badges
  let locBadges = '';
  if (d.quadrat)   locBadges += `<span class="badge bg-indigo-900 text-indigo-200">📍 ${d.quadrat}</span>`;
  if (d.stadtteil) locBadges += `<span class="badge bg-indigo-800 text-indigo-200">🏘 ${d.stadtteil}</span>`;

  // Zimmer badge
  const zimBadge = d.zimmer
    ? `<span class="badge bg-gray-700 text-gray-200">🛏 ${d.zimmer} Zi.</span>`
    : '';

  const featureTags = (d.features || []).map(f => `<span class="tag">${f}</span>`).join('');
  const firstSeen = d.first_seen ? d.first_seen.slice(0,10) : '–';

  let kennzahlen = '';

  if (isKauf) {
    const preis = d.kaufpreis ? fmtEuro(d.kaufpreis) : '–';
    const miete = d.kaltmiete ? fmtEuro(d.kaltmiete) + '/Mo.' : '–';
    const bank  = d.bankrate_monat ? fmtEuro(d.bankrate_monat) + '/Mo.' : '–';
    const cf    = d.cashflow_monat !== undefined && d.cashflow_monat !== null
      ? (d.cashflow_monat >= 0 ? '+' : '') + fmtEuro(d.cashflow_monat) + '/Mo.' : '–';
    const cfCls = d.cashflow_monat >= 0 ? 'text-green-400 font-bold'
      : d.cashflow_monat >= -150 ? 'text-yellow-400 font-bold' : 'text-red-400 font-bold';

    kennzahlen = `
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">
        ${kz('Kaufpreis', preis)}
        ${kz('Kaltmiete/Mo.', miete)}
        ${kz('Bankrate/Mo.', bank)}
        <div class="bg-gray-800 rounded-lg px-3 py-2 text-center">
          <p class="text-gray-400 text-xs mb-0.5">Cashflow/Mo.</p>
          <p class="${cfCls} text-sm">${cf}</p>
        </div>
      </div>`;
    if (d.wohnflaeche_qm && d.kaufpreis) {
      kennzahlen += `<p class="text-xs text-gray-500 mt-2">🏠 ${d.wohnflaeche_qm} m² · ${Math.round(d.kaufpreis/d.wohnflaeche_qm).toLocaleString('de')} €/m²</p>`;
    }
  } else {
    const kalt = d.kaltmiete  ? fmtEuro(d.kaltmiete)  + '/Mo.' : '–';
    const nk   = d.nebenkosten ? fmtEuro(d.nebenkosten) + '/Mo.' : '–';
    const warm = d.warmmiete  ? fmtEuro(d.warmmiete)  + '/Mo.' : '–';
    const qm   = d.kaltmiete_qm ? d.kaltmiete_qm.toFixed(2) + ' €/m²' : '–';

    let devBadge = '';
    if (d.deal_deviation_pct !== undefined && d.deal_deviation_pct !== null) {
      const dev = d.deal_deviation_pct;
      const devCls = dev <= -10 ? 'deviation-gut' : dev <= 10 ? 'deviation-okay' : 'deviation-teuer';
      devBadge = `<span class="inline-block px-2 py-0.5 rounded text-xs font-bold ${devCls}">${dev>0?'+':''}${dev.toFixed(1)}% vs. Markt</span>`;
    }

    kennzahlen = `
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">
        ${kz('Kaltmiete', kalt)}
        ${kz('Nebenkosten', nk)}
        ${kz('Warmmiete', warm)}
        ${kz('Preis/m²', qm)}
      </div>
      <div class="flex flex-wrap gap-2 mt-2 items-center text-xs text-gray-400">
        ${d.expected_market_qm ? `<span>📊 Markt-Benchmark: <strong class="text-gray-300">${d.expected_market_qm.toFixed(2)} €/m²</strong></span>` : ''}
        ${devBadge}
        ${d.wohnflaeche_qm ? `<span>· 🏠 ${d.wohnflaeche_qm} m²</span>` : ''}
      </div>`;
  }

  const aiBlock = d.einschaetzung
    ? `<div class="mt-3 text-xs text-gray-400 italic border-l-2 border-indigo-700 pl-3">🤖 ${d.einschaetzung}</div>`
    : '';

  return `
  <div class="bg-gray-900 rounded-xl p-5 score-${score} hover:bg-gray-800 transition-colors">
    <div class="flex flex-wrap gap-2 items-center mb-2">
      <span class="badge ${scoreCls}">${scoreLabel}</span>
      ${typeBadge}
      ${zimBadge}
      ${locBadges}
      <span class="badge ${srcCls}">${d.source.replace('_',' ')}</span>
      <span class="text-xs text-gray-500 ml-auto">📅 ${firstSeen}</span>
    </div>
    <a href="${d.url}" target="_blank" rel="noopener noreferrer"
       class="text-white font-semibold text-sm hover:text-indigo-400 transition-colors line-clamp-2">
      ${d.title}
    </a>
    ${featureTags ? `<div class="mt-2">${featureTags}</div>` : ''}
    ${kennzahlen}
    ${aiBlock}
  </div>`;
}

function kz(label, value) {
  return `<div class="bg-gray-800 rounded-lg px-3 py-2 text-center">
    <p class="text-gray-400 text-xs mb-0.5">${label}</p>
    <p class="text-white font-semibold text-sm">${value}</p>
  </div>`;
}

function fmtEuro(n) { return Math.round(n).toLocaleString('de-DE') + ' €'; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-semibold shadow-xl z-50 transition-opacity duration-300 ${
    type==='success' ? 'bg-green-700 text-white' : 'bg-red-700 text-white'}`;
  t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

loadData();
</script>
</body>
</html>
